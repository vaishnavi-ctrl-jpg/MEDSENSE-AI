name: medsense-triage
version: "1.0"
description: >
  MedSense AI is a hospital emergency triage RL environment where an agent learns 
  to prioritize patients based on vitals and symptoms. Supports text-based 
  actions for LLM integration.
domain: healthcare
real_world: true

authors:
  - name: ViVi
    role: "Environment Wrapper + LLM Parsing Logic"
  - name: Nidhi
    role: "FastAPI Server + Dockerization + OpenEnv Validation"
  - name: Pooja
    role: "Results Visualization + Documentation + UI"

tasks:
  - id: triage_easy
    description: "Single patient, unambiguous vital signs, no comorbidities"
    difficulty: easy
    success_threshold: 0.85
  - id: triage_medium
    description: "Single patient with comorbidities and ambiguous presentation"
    difficulty: medium
    success_threshold: 0.72
  - id: triage_hard
    description: "Multi-patient queue under time pressure (Hard Mode)"
    difficulty: hard
    success_threshold: 0.60

# --- CRITICAL CHANGE: Pointing to your FastAPI server ---
interface:
  type: api
  base_url: "http://localhost:8000"
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"

observation_space:
  type: Dict
  schema:
    bp_systolic: float
    heart_rate: float
    spo2: float
    temperature: float
    chief_complaint: int
    has_cardiac_history: int
    queue_length: int

# --- CRITICAL CHANGE: Matching ViVi's Text-to-Action requirement ---
action_space:
  type: Text
  description: "LLM-generated text (e.g., 'Treat patient 1') parsed into clinical decisions."

reward:
  correct_action: +1.0
  missed_critical: -2.0
  over_triage: -0.5
  parsing_error: -0.1
  timeout: -0.2

grader:
  key_metric: critical_miss_rate
  pass_condition: "critical_miss_rate < 0.05"

docker:
  image: medsense-api
  port: 8000
  build_context: .