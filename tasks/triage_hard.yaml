task_id: triage_hard
description: "Multi-patient queue with time pressure and high ambiguity"
difficulty: hard

patients_per_episode: 5
noise_level: 0.15
ambiguity: high
comorbidities: true
queue: true
time_pressure: true

success_threshold: 0.60
max_steps: 50

notes: >
  Hard mode is the core benchmark challenge.
  Five patients arrive simultaneously — the agent must prioritise the queue.
  High measurement noise means vitals are less reliable.
  Time pressure applies: missing a critical patient terminates the episode early.
  A critical_miss_rate above 5% automatically fails this task regardless of
  overall accuracy. No heuristic baseline currently passes Hard mode.
  This is the open benchmark — designed for trained RL agents to solve.
